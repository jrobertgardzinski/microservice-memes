spring.application.name=memes-service
server.port=8083

# Uploads can be a few MB; cap them.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Largest side (px) a stored meme may have; bigger uploads are scaled down.
# Where the image bytes live: 'db' (default; their own table, no external service) or
# 'filesystem' (memes.blob-dir) — the stepping stone to S3/MinIO (same ObjectStore port).
memes.blob-store=${MEMES_BLOB_STORE:db}
memes.blob-dir=${MEMES_BLOB_DIR:/var/lib/memes/blobs}

memes.image.max-dimension=1024
# Largest side (px) of an on-demand thumbnail.
memes.image.thumbnail-max-dimension=256

# Metadata AND bytes live in the database: Postgres on the stack (DB_URL), an in-memory H2 in
# PostgreSQL mode otherwise — the same JDBC adapters either way. Flyway owns the schema.
spring.datasource.url=${DB_URL:jdbc:h2:mem:memes;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# Where microservice-security lives; writes require a bearer token it confirms (GET /me).
security.url=${SECURITY_URL:http://localhost:8080}

# Account-deletion saga: commands arrive on Kafka and confirmations go back; enabled where a
# broker exists (compose). Tests drive the purge use case directly. This service owns the MEMES
# axis of the purge (comments live in microservice-comments): DELETE | ANONYMIZE_AUTHOR |
# KEEP_POPULAR_ANONYMIZED:<minScore>; the deployment default below, the wizard may override it.
memes.purge.memes=${PURGE_MEMES_POLICY:DELETE}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
memes.kafka-enabled=${KAFKA_ENABLED:false}

# observability: correlation id on every log line
logging.pattern.level=%5p [cid=%X{cid:-}]
