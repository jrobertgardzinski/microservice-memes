spring.application.name=memes-service
server.port=8083

# Uploads can be a few MB; cap them.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Largest side (px) a stored meme may have; bigger uploads are scaled down.
memes.image.max-dimension=1024
# Largest side (px) of an on-demand thumbnail.
memes.image.thumbnail-max-dimension=256

# Where microservice-security lives; writes require a bearer token it confirms (GET /me).
security.url=${SECURITY_URL:http://localhost:8080}

# Account-deletion saga: commands arrive on Kafka and confirmations go back; enabled where a
# broker exists (compose). Tests drive the purge use case directly. This service owns the MEMES
# axis of the purge (comments live in microservice-comments): DELETE | ANONYMIZE_AUTHOR |
# KEEP_POPULAR_ANONYMIZED:<minScore>; the deployment default below, the wizard may override it.
memes.purge.memes=${PURGE_MEMES_POLICY:DELETE}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
memes.kafka-enabled=${KAFKA_ENABLED:false}
