name: CI

# microservice-memes needs one sibling SNAPSHOT (voting, public), so CI checks it out and installs
# it first. Checkouts use the workspace layout (each repo in its own directory) because the
# saga-confirmation provider test verifies microservice-security's committed pact from the sibling
# checkout. The reactor CI (in the aggregator repo) still validates everything together.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: microservice-memes
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/voting
          path: voting
      # consumer of this service's confirmations — checkout only (its pacts/), no build
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-security
          path: microservice-security
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Install the voting library
        run: mvn -B -q --no-transfer-progress -f voting/pom.xml install -DskipTests
      - name: Build and test (including pact provider verification)
        run: mvn -B --no-transfer-progress -f microservice-memes/pom.xml clean verify
